services:
  - type: web
    name: fc-regny-widget
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: club-data
      mountPath: /var/data
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: COOKIE_SECURE
        value: "true"
      - key: DATA_DIR
        value: /var/data/fc-regny
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        sync: false
